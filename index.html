<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Cinema • Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        :root {
            --bg-color: #08080a;
            --accent-color: #bb86fc; /* Warna Neon Violet */
            --text-color: #e0e0e0;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --font-family: 'Poppins', sans-serif;
            --sidebar-width: 350px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            overflow: hidden; /* Mencegah scroll double */
        }

        /* Dynamic Background dengan efek blur */
        #dynamic-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #08080a 100%);
            z-index: -2;
            transition: background 1s ease;
        }
        
        #ambient-glow {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 80%;
            background: var(--accent-color);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
            transition: background 1s ease, opacity 0.5s ease;
        }

        /* Layout Utama */
        .app-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Area Video Utama */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            padding-right: calc(var(--sidebar-width) + 20px); /* Ruang untuk sidebar */
            transition: all 0.5s ease;
        }
        
        /* Judul Video di atas player */
        #now-playing-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            align-self: flex-start;
            opacity: 0.8;
        }

        .player-container {
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            border: 1px solid var(--glass-border);
            position: relative;
        }
        
        /* Iframe styling untuk mode embed */
        #embed-player {
            width: 100%; height: 100%; border: none; display: none;
        }

        /* Sidebar - Glassmorphism */
        .sidebar {
            position: fixed;
            top: 20px;
            right: 20px;
            bottom: 20px;
            width: var(--sidebar-width);
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
            box-shadow: -10px 0 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .sidebar-header {
            padding: 25px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .sidebar-header i {
            font-size: 1.8rem;
            color: var(--accent-color);
        }

        .sidebar-header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .video-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        /* Custom Scrollbar untuk sidebar */
        .video-list::-webkit-scrollbar { width: 6px; }
        .video-list::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }

        /* Item List Video */
        .video-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            position: relative;
        }

        .video-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(-5px);
        }

        .video-item.active {
            background: rgba(187, 134, 252, 0.1);
            border: 1px solid rgba(187, 134, 252, 0.3);
        }
        
        .video-item.active::before {
            content: '';
            position: absolute;
            left: -5px; top: 50%; transform: translateY(-50%);
            height: 60%; width: 3px;
            background-color: var(--accent-color);
            border-radius: 3px;
            box-shadow: 0 0 10px var(--accent-color);
        }

        .icon-box {
            width: 45px; height: 45px;
            border-radius: 10px;
            background: rgba(255,255,255, 0.03);
            display: flex; align-items: center; justify-content: center;
            margin-right: 15px;
            border: 1px solid var(--glass-border);
        }
        
        .video-item.active .icon-box {
            background: rgba(187, 134, 252, 0.1);
            border-color: rgba(187, 134, 252, 0.2);
        }

        .icon-box i {
            font-size: 1.4rem;
            opacity: 0.7;
        }
        
        .video-item.active .icon-box i {
            color: var(--accent-color);
            opacity: 1;
        }

        .video-info {
            flex: 1;
        }

        .video-title {
            font-size: 0.95rem;
            font-weight: 400;
            margin-bottom: 2px;
            color: rgba(255,255,255,0.8);
            /* Truncate text jika kepanjangan */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .video-item.active .video-title {
            color: #fff;
            font-weight: 600;
        }

        .video-type {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.5;
        }

        /* Mode Bioskop: Sembunyikan sidebar saat mouse tidak bergerak */
        body.cinema-mode .sidebar {
            opacity: 0;
            transform: translateX(100px);
            pointer-events: none;
        }
        
        body.cinema-mode .main-content {
            padding-right: 40px; /* Kembalikan padding */
        }
        
        body.cinema-mode #ambient-glow {
            opacity: 0.2; /* Sedikit lebih terang di mode bioskop */
        }

        /* Customization untuk Plyr agar serasi */
        .plyr--full-ui input[type=range] {
            color: var(--accent-color);
        }
        .plyr__control--overlaid {
            background: rgba(187, 134, 252, 0.5);
        }
        .plyr__controls {
            background: linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0.7)) !important;
            padding-top: 20px !important;
        }
        .plyr--video {
            border-radius: 16px;
        }

        /* Responsif Mobile */
        @media (max-width: 900px) {
            .app-wrapper {
                flex-direction: column;
            }
            .main-content {
                padding: 15px;
                padding-right: 15px;
                height: 40vh; /* Video di atas */
                flex: none;
            }
            .sidebar {
                position: relative;
                top: 0; right: 0; bottom: 0;
                width: auto;
                flex: 1;
                margin: 15px;
                border-radius: 16px;
            }
            #now-playing-title { font-size: 1.1rem; margin-bottom: 10px; }
            body.cinema-mode .sidebar {
                transform: translateY(50px);
            }
        }
    </style>
</head>
<body>

    <div id="dynamic-bg"></div>
    <div id="ambient-glow"></div>

    <div class="app-wrapper">
        <main class="main-content">
            <div id="now-playing-title">Pilih Video...</div>
            
            <div class="player-container">
                <video id="player" playsinline controls></video>
                
                <iframe id="embed-player" allowfullscreen></iframe>
            </div>
        </main>

        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="ri-play-list-2-line"></i>
                <h1>Library</h1>
            </div>
            <div class="video-list" id="videoList">
                <div style="text-align:center; padding:20px; opacity:0.5;">Loading Library...</div>
            </div>
        </aside>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        // MASUKKAN URL WEB APP GAS KAMU DISINI
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzIYUDU5Mbtdm78rwL0nJVkpeCqHctJFTyLlBPnjQQDe731OF9MhaSiOh9YN_rTmNnM-w/exec?action=getVideos';
        
        let player;
        const playerEl = document.getElementById('player');
        const embedPlayerEl = document.getElementById('embed-player');
        const titleEl = document.getElementById('now-playing-title');
        const glowEl = document.getElementById('ambient-glow');

        // Inisialisasi Plyr
        player = new Plyr('#player', {
            controls: ['play-large', 'play', 'progress', 'current-time', 'duration', 'mute', 'volume', 'fullscreen'],
            ratio: '16:9'
        });

        // Fetch Data dari GAS
        fetch(GAS_URL)
            .then(res => res.json())
            .then(data => {
                const listContainer = document.getElementById('videoList');
                listContainer.innerHTML = '';
                
                if (data.length === 0) {
                    listContainer.innerHTML = '<div style="text-align:center; padding:20px; opacity:0.5;">Folder Drive kosong / belum diset.</div>';
                    return;
                }
                
                data.forEach((video, index) => {
                    const item = document.createElement('div');
                    item.className = 'video-item';
                    item.dataset.index = index;
                    
                    // Tentukan ikon berdasarkan tipe
                    let icon = 'ri-video-line';
                    if (video.type === 'youtube') icon = 'ri-youtube-line';
                    if (video.type === 'drive') icon = 'ri-google-fill';
                    if (video.type === 'embed') icon = 'ri-global-line';

                    item.innerHTML = `
                        <div class="icon-box"><i class="${icon}"></i></div>
                        <div class="video-info">
                            <div class="video-title">${video.title}</div>
                            <div class="video-type">${video.type}</div>
                        </div>
                    `;
                    
                    item.onclick = () => playVideo(video, item);
                    listContainer.appendChild(item);
                });
            })
            .catch(err => {
                document.getElementById('videoList').innerHTML = '<div style="text-align:center; padding:20px; color:#ff4444;">Error fetching data. Cek console.</div>';
                console.error(err);
            });

        function playVideo(video, element) {
            // Sembunyikan kedua player dulu
            playerEl.style.display = 'none';
            embedPlayerEl.style.display = 'none';
            player.stop(); // Stop Plyr jika sedang putar sesuatu

            // Update UI
            titleEl.innerText = video.title;
            
            // Hapus class active dari item sebelumnya
            document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
            // Tambah class active ke item terpilih
            element.classList.add('active');
            
            // Ganti warna ambient berdasarkan tipe (sebagai fallback sebelum fitur ambil warna video nyata)
            updateAmbientColor(video.type);

            if (video.type === 'embed') {
                // Gunakan Iframe Player
                embedPlayerEl.style.display = 'block';
                embedPlayerEl.src = video.url;
            } else {
                // Gunakan Plyr (untuk Drive, HTML5, YouTube)
                playerEl.style.display = 'block';
                let sources = [];
                let provider = 'html5';

                if (video.type === 'youtube') {
                    sources = [{ src: video.url, provider: 'youtube' }];
                } else if (video.type === 'drive') {
                    // Direct Link Drive
                    const directLink = `https://docs.google.com/uc?export=download&id=${video.url}`;
                    sources = [{ src: directLink, type: 'video/mp4' }];
                }
                
                player.source = { type: 'video', title: video.title, sources: sources };
                
                // Auto play, seringkali diblokir browser modern, tapi kita coba.
                setTimeout(() => { player.play(); }, 500);
            }
        }
        
        // Fungsi sederhana merubah warna glow berdasarkan tipe video
        function updateAmbientColor(type) {
            let color = '#bb86fc'; // Default Violet
            if (type === 'youtube') color = '#ff0000';
            if (type === 'drive') color = '#34a853';
            if (type === 'embed') color = '#00bcd4';
            
            glowEl.style.background = color;
        }

        // --- FITUR CINEMA MODE (Auto Hide UI) ---
        let cinemaTimeout;
        const bodyEl = document.body;

        function showUI() {
            bodyEl.classList.remove('cinema-mode');
            clearTimeout(cinemaTimeout);
            // Jika video sedang diputar, set timeout untuk sembunyikan lagi
            if (player.playing || embedPlayerEl.style.display === 'block') {
                cinemaTimeout = setTimeout(hideUI, 3000); // Sembunyikan setelah 3 detik diam
            }
        }

        function hideUI() {
            // Jangan sembunyikan jika mouse sedang di atas sidebar
            if (document.querySelector('.sidebar:hover')) return;
            bodyEl.classList.add('cinema-mode');
        }

        // Event listeners untuk deteksi pergerakan mouse
        document.addEventListener('mousemove', showUI);
        document.addEventListener('click', showUI);
        document.addEventListener('touchstart', showUI);
        
        // Event listeners dari Plyr
        player.on('play', () => { cinemaTimeout = setTimeout(hideUI, 2000); });
        player.on('pause', () => { showUI(); });

    </script>
</body>
</html>
